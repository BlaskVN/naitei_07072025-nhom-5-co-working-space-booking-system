<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kết quả gửi thông báo</title>
</head>
<body>
    <div th:replace="layouts/admin_layout :: layout(~{::section})">
        <section>
            <h1>Kết quả gửi thông báo</h1>
            
            <div>
                <p>Tổng số người nhận: <span th:text="${result.totalRecipients}">0</span></p>
                <p>Gửi thành công: <span th:text="${result.successCount}">0</span></p>
                <p>Gửi thất bại: <span th:text="${result.failedCount}">0</span></p>
            </div>
            
            <!-- Danh sách email thất bại -->
            <div th:if="${result.failedCount > 0}">
                <h3>Danh sách email thất bại</h3>
                <ul>
                    <li th:each="email : ${result.failedEmails}" th:text="${email}"></li>
                </ul>
            </div>
            
            <!-- Nút tạo thông báo khác -->
            <div>
                <a th:href="@{/admin/notifications/new}" class="btn btn-primary">Tạo thông báo khác</a>
            </div>
        </section>
    </div>
</body>
</html>
