<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{admin.notification.result.title}">Kết quả gửi thông báo</title>
</head>
<body>
    <div th:replace="layouts/admin_layout :: layout(~{::section})">
        <section>
            <h1 th:text="#{admin.notification.result.title}">Kết quả gửi thông báo</h1>
            
            <div>
                <p th:text="#{admin.notification.result.total(${result.totalRecipients})}">
                    Tổng số người nhận: 0
                </p>
                <p th:text="#{admin.notification.result.success(${result.successCount})}">
                    Gửi thành công: 0
                </p>
                <p th:text="#{admin.notification.result.failed(${result.failedCount})}">
                    Gửi thất bại: 0
                </p>
            </div>
            
            <!-- Danh sách email thất bại -->
            <div th:if="${result.failedCount > 0}">
                <h3 th:text="#{admin.notification.result.failed.list}">Danh sách email thất bại</h3>
                <ul>
                    <li th:each="email : ${result.failedEmails}" th:text="${email}"></li>
                </ul>
            </div>
            
            <!-- Nút tạo thông báo khác -->
            <div>
                <a th:href="@{/admin/notifications/new}" 
                   th:text="#{admin.notification.result.back}">
                    Tạo thông báo khác
                </a>
            </div>
        </section>
    </div>
</body>
</html>
